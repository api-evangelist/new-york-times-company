apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-timeswire
  provider: new-york-times-company
  api: times-newswire-api
  tags:
    - Newswire
    - Firehose
    - Real Time
spec:
  summary: Stream NYT article metadata as soon as new pieces are published.
  inputs:
    - name: source
      type: string
      required: true
      enum: [all, nyt, iht]
    - name: section
      type: string
      required: true
      description: "all, a single section, or semicolon-separated section list."
    - name: timePeriodHours
      type: integer
      required: false
      description: When provided, scopes results to the last N hours.
    - name: limit
      type: integer
      required: false
      default: 20
    - name: offset
      type: integer
      required: false
      default: 0
  outputs:
    - name: articles
      type: array
  operation:
    method: GET
    baseURL: https://api.nytimes.com/svc/news/v3
  auth:
    type: apiKey
    in: query
    name: api-key
