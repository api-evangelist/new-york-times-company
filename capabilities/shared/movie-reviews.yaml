apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-movie-reviews
  provider: new-york-times-company
  api: movie-reviews-api
  tags:
    - Movies
    - Reviews
    - Critics
spec:
  summary: Search NYT movie reviews and retrieve critic biographies.
  inputs:
    - name: operation
      type: string
      required: true
      enum: [searchReviews, listReviews, criticsPicks, getCritic]
    - name: query
      type: string
      required: false
    - name: criticsPick
      type: boolean
      required: false
    - name: reviewer
      type: string
      required: false
    - name: order
      type: string
      required: false
      enum: [by-opening-date, by-publication-date, by-title]
    - name: offset
      type: integer
      required: false
  outputs:
    - name: reviews
      type: array
  operation:
    method: GET
    baseURL: https://api.nytimes.com/svc/movies/v2
  auth:
    type: apiKey
    in: query
    name: api-key
