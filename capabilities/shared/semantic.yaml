apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-semantic
  provider: new-york-times-company
  api: semantic-api
  tags:
    - Semantic
    - Concepts
    - Linked Data
    - Entities
spec:
  summary: Look up a Times Topics concept (person, place, organization, descriptor).
  inputs:
    - name: conceptType
      type: string
      required: true
      enum: [nytd_per, nytd_geo, nytd_org, nytd_des]
    - name: conceptName
      type: string
      required: true
    - name: fields
      type: array
      required: false
      description: Comma-separated list of fields to include (article_list, ticker_symbol, etc.).
  outputs:
    - name: concept
      type: object
  operation:
    method: GET
    path: /name/{conceptType}/{conceptName}.json
    baseURL: https://api.nytimes.com/svc/semantic/v2/concept
  auth:
    type: apiKey
    in: query
    name: api-key
