apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-times-tags
  provider: new-york-times-company
  api: times-tags-api
  tags:
    - Tags
    - Auto Suggest
    - Controlled Vocabulary
spec:
  summary: Auto-suggest matches from the NYT controlled vocabulary (~27K Times Topics tags).
  inputs:
    - name: query
      type: string
      required: true
      description: Search prefix to match against tag dictionary.
    - name: filter
      type: array
      itemsEnum: [Des, Geo, Org, Per]
      required: false
      description: Restrict to descriptor, geo, organization, or person tags.
    - name: max
      type: integer
      required: false
      default: 10
  outputs:
    - name: suggestions
      type: array
      items:
        type: string
  operation:
    method: GET
    path: /timestags
    baseURL: https://api.nytimes.com/svc/suggest/v1
  auth:
    type: apiKey
    in: query
    name: api-key
