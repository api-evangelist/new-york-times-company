apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-books
  provider: new-york-times-company
  api: books-api
  tags:
    - Books
    - Best Sellers
    - Reviews
spec:
  summary: Look up NYT best-seller lists and book reviews.
  inputs:
    - name: operation
      type: string
      required: true
      enum: [listNames, listByDate, currentList, reviewsByAuthor, reviewsByIsbn, reviewsByTitle]
    - name: list
      type: string
      required: false
      example: hardcover-fiction
    - name: date
      type: string
      required: false
      description: ISO date or "current".
    - name: author
      type: string
      required: false
    - name: isbn
      type: string
      required: false
    - name: title
      type: string
      required: false
  outputs:
    - name: books
      type: array
  operation:
    method: GET
    baseURL: https://api.nytimes.com/svc/books/v3
  auth:
    type: apiKey
    in: query
    name: api-key
