apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-archive
  provider: new-york-times-company
  api: archive-api
  tags:
    - Articles
    - Archive
    - History
    - Bulk Data
spec:
  summary: Retrieve all NYT article metadata for a given month, going back to 1851.
  inputs:
    - name: year
      type: integer
      required: true
      minimum: 1851
    - name: month
      type: integer
      required: true
      minimum: 1
      maximum: 12
  outputs:
    - name: articles
      type: array
  operation:
    method: GET
    path: /{year}/{month}.json
    baseURL: https://api.nytimes.com/svc/archive/v1
  auth:
    type: apiKey
    in: query
    name: api-key
  notes: |
    Responses can be ~20MB and contain thousands of articles. Mirror locally
    to build your own NYT article-metadata corpus.
