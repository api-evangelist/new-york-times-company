apiVersion: naftiko.io/v1
kind: Capability
metadata:
  name: nyt-geo
  provider: new-york-times-company
  api: geo-api
  tags:
    - Geographic
    - Linked Data
    - Places
    - Events
spec:
  summary: Search NYT-tagged places/events with GeoNames-enriched location data.
  inputs:
    - name: name
      type: string
      required: false
    - name: latitude
      type: number
      required: false
    - name: longitude
      type: number
      required: false
    - name: query
      type: string
      required: false
    - name: filter
      type: string
      required: false
    - name: dateRange
      type: string
      required: false
      example: "2025-01-01:2025-12-31"
    - name: limit
      type: integer
      required: false
      default: 20
    - name: offset
      type: integer
      required: false
      default: 0
  outputs:
    - name: events
      type: array
  operation:
    method: GET
    path: /query.json
    baseURL: https://api.nytimes.com/svc/semantic/v2/geocodes
  auth:
    type: apiKey
    in: query
    name: api-key
